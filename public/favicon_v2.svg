<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a1a2e"/>

  <!-- Steering wheel outer ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#e8c84a" stroke-width="5"/>

  <!-- Center hub -->
  <circle cx="32" cy="32" r="6" fill="#e8c84a"/>

  <!-- Spokes -->
  <!-- Top spoke -->
  <line x1="32" y1="26" x2="32" y2="14" stroke="#e8c84a" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bottom-left spoke -->
  <line x1="27" y1="36" x2="16" y2="46" stroke="#e8c84a" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bottom-right spoke -->
  <line x1="37" y1="36" x2="48" y2="46" stroke="#e8c84a" stroke-width="4.5" stroke-linecap="round"/>
</svg>
